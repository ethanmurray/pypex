/* ═══════════════════════════════════════════
   THREE.JS HELPERS & COMPONENT BUILDERS
   ═══════════════════════════════════════════ */

function helixPts(turns, ppt, r, h, phase = 0) {
  const pts = [], n = turns * ppt;
  for (let i = 0; i <= n; i++) {
    const t = i / n, a = t * turns * Math.PI * 2 + phase;
    pts.push(new THREE.Vector3(Math.cos(a) * r, (t - 0.5) * h, Math.sin(a) * r));
  }
  return pts;
}
function lerpC(a, b, t) { return new THREE.Color(a.r+(b.r-a.r)*t, a.g+(b.g-a.g)*t, a.b+(b.b-a.b)*t); }
function gradTube(pts, cA, cB, r = 0.05) {
  const curve = new THREE.CatmullRomCurve3(pts, false);
  const ts = pts.length*3, rs = 10;
  const geo = new THREE.TubeGeometry(curve, ts, r, rs, false);
  const colors = new Float32Array(geo.attributes.position.count * 3);
  const ring = rs+1, rings = ts+1, ca = new THREE.Color(cA), cb = new THREE.Color(cB);
  for (let i = 0; i < geo.attributes.position.count; i++) {
    const c = lerpC(ca, cb, Math.floor(i/ring)/(rings-1));
    colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
  }
  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  const m = new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({ vertexColors:true, metalness:0.55, roughness:0.25, clearcoat:0.3 }));
  m.castShadow = true; return m;
}
function mkPipe(pts, col, r = 0.05) {
  const m = new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts,false), pts.length*5, r, 10, false),
    new THREE.MeshPhysicalMaterial({ color:col, metalness:0.55, roughness:0.25, clearcoat:0.3 }));
  m.castShadow = true; return m;
}
function mm(col, extra={}) { return new THREE.MeshPhysicalMaterial({ color:col, metalness:0.35, roughness:0.35, clearcoat:0.3, ...extra }); }
function lbl(text, col, sz=44) {
  const c = document.createElement("canvas"); c.width=1024; c.height=128;
  const ctx = c.getContext("2d");
  ctx.font = `bold ${sz}px monospace`; ctx.fillStyle = col; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(text, 512, 64);
  return new THREE.Mesh(new THREE.PlaneGeometry(4.0,0.5),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent:true, side:THREE.DoubleSide, depthWrite:false }));
}
function toL(pp, wp) { return new THREE.Vector3(wp.x-pp.x, wp.y-pp.y, wp.z-pp.z); }

/* Component builders (same as before, compact) */
function buildHX() {
  const g = new THREE.Group(), sR=0.7, sH=2.0;
  g.userData.sR=sR; g.userData.sH=sH;
  const hotCoil = new THREE.Group();
  hotCoil.add(gradTube(helixPts(3,30,0.5,1.6,0), 0xee2222, 0x2266dd, 0.035));
  const hcl = lbl("HEAT SOURCE COIL","#bb3322",36); hcl.position.set(0,sH/2+0.35,0); hcl.scale.set(0.55,0.55,1); hcl.visible=false;
  hotCoil.add(hcl); g.add(hotCoil); g.userData.hotCoil=hotCoil; g.userData.hotCoilLabel=hcl;
  const orcCoil = new THREE.Group();
  orcCoil.add(gradTube(helixPts(3,30,0.5,1.6,Math.PI), 0x2266dd, 0xee2222, 0.035));
  const ocl = lbl("ORC FLUID COIL","#1a55bb",36); ocl.position.set(0,sH/2+0.35,0); ocl.scale.set(0.55,0.55,1); ocl.visible=false;
  orcCoil.add(ocl); g.add(orcCoil); g.userData.orcCoil=orcCoil; g.userData.orcCoilLabel=ocl;
  const shell = new THREE.Group();
  shell.add(new THREE.Mesh(new THREE.CylinderGeometry(sR,sR,sH,20), mm(0xb0c4d8,{transparent:true,opacity:0.85})));
  const capG = new THREE.CylinderGeometry(sR,sR,0.04,20), capM = mm(0xc4d4e4,{transparent:true,opacity:0.85});
  const tc = new THREE.Mesh(capG,capM); tc.position.y=sH/2; shell.add(tc);
  const bc = new THREE.Mesh(capG.clone(),capM.clone()); bc.position.y=-sH/2; shell.add(bc);
  const sl = lbl("HEAT EXCHANGER","#2a4055",40); sl.position.set(0,0,sR+0.22); sl.scale.set(0.75,0.75,1); shell.add(sl);
  g.add(shell); g.userData.shell=shell;
  return g;
}
function buildTurbine() {
  const g = new THREE.Group(), bodyR=0.55, bodyH=1.1, nStages=5, nBlades=10;
  const casing = new THREE.Group();
  casing.add(new THREE.Mesh(new THREE.CylinderGeometry(bodyR,bodyR+0.05,bodyH,20), mm(0xa8bcd0,{transparent:true,opacity:0.85})));
  const tc2 = new THREE.Mesh(new THREE.CylinderGeometry(bodyR,bodyR,0.04,20), mm(0xc0d0dd,{transparent:true,opacity:0.85}));
  tc2.position.y=bodyH/2; casing.add(tc2);
  const intake = new THREE.Mesh(new THREE.CylinderGeometry(0.25,bodyR-0.05,0.35,16), mm(0xb8c8d8,{transparent:true,opacity:0.85}));
  intake.position.y=bodyH/2+0.18; casing.add(intake);
  const bc2 = new THREE.Mesh(new THREE.CylinderGeometry(bodyR+0.05,bodyR+0.05,0.04,20), mm(0xc0d0dd,{transparent:true,opacity:0.85}));
  bc2.position.y=-bodyH/2; casing.add(bc2);
  for(let i=0;i<4;i++){const r=new THREE.Mesh(new THREE.TorusGeometry(bodyR+0.02,0.02,6,24),mm(0xd0dde8,{transparent:true,opacity:0.85}));r.position.y=-bodyH*0.35+i*bodyH*0.24;r.rotation.x=Math.PI/2;casing.add(r);}
  const cl = lbl("TURBINE","#2a4055",44); cl.position.set(0,0,bodyR+0.18); casing.add(cl);
  g.add(casing); g.userData.casing=casing;
  const internals = new THREE.Group();
  internals.add(new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,bodyH+0.3,8), mm(0xcccccc)));
  const stages = [];
  for(let s=0;s<nStages;s++){
    const stage=new THREE.Group(), yPos=-bodyH*0.38+s*(bodyH*0.76/(nStages-1)), isRotor=s%2===0;
    const hubR=isRotor?0.1:bodyR-0.02;
    stage.add(new THREE.Mesh(new THREE.CylinderGeometry(hubR,hubR,0.012,16), mm(isRotor?0xddbb44:0xbbccdd)));
    for(let b=0;b<nBlades;b++){
      const angle=(b/nBlades)*Math.PI*2, bladeLen=isRotor?0.36:0.34;
      const blade=new THREE.Mesh(new THREE.BoxGeometry(bladeLen,0.015,0.08), mm(isRotor?0xddcc55:0xc0d0e0));
      const midR=isRotor?0.1+bladeLen/2:bodyR-0.04-bladeLen/2;
      blade.position.set(Math.cos(angle)*midR,0,Math.sin(angle)*midR);
      blade.rotation.y=-angle; blade.rotation.x=isRotor?0.25:-0.2; stage.add(blade);
    }
    if(s===0||s===nStages-1){const sl2=lbl(isRotor?"ROTOR":"STATOR",isRotor?"#998822":"#556688",28);sl2.position.set(0,0,bodyR-0.1);sl2.scale.set(0.3,0.3,1);sl2.visible=false;stage.add(sl2);stage.userData.stageLabel=sl2;}
    stage.position.y=yPos; stages.push(stage); internals.add(stage);
  }
  g.add(internals); g.userData.internals=internals; g.userData.stages=stages; g.userData.bodyH=bodyH;
  return g;
}
function buildGenerator() {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.0,14), mm(0x66cc99)));
  for(const y of[-0.5,0.5]){const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,0.04,14),mm(0xddaa44));cap.position.y=y;g.add(cap);}
  for(let i=0;i<3;i++){const c=new THREE.Mesh(new THREE.TorusGeometry(0.42,0.015,6,16),mm(0xeebb55));c.position.y=-0.3+i*0.3;c.rotation.x=Math.PI/2;g.add(c);}
  const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.6,8),mm(0xbbbbbb));shaft.position.y=0.8;g.add(shaft);
  const l=lbl("GENERATOR","#1a7050",40);l.position.set(0,0,0.56);g.add(l);
  return g;
}
function buildCondenser() {
  const g = new THREE.Group(), bW=1.0, bH=0.8, bD=0.6;
  const casing = new THREE.Group();
  casing.add(new THREE.Mesh(new THREE.BoxGeometry(bW,bH,bD), mm(0x88bbee,{transparent:true,opacity:0.85})));
  casing.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(bW+0.005,bH+0.005,bD+0.005)),new THREE.LineBasicMaterial({color:0x6699cc,transparent:true,opacity:0.6})));
  for(let i=-4;i<=4;i++){const f=new THREE.Mesh(new THREE.BoxGeometry(0.98,0.006,bD+0.04),mm(0xaaddff,{transparent:true,opacity:0.85}));f.position.y=i*0.04;casing.add(f);}
  const cl=lbl("CONDENSER","#1a5588",42);cl.position.set(0,0,bD/2+0.16);casing.add(cl);
  g.add(casing); g.userData.casing=casing;
  const internals = new THREE.Group();
  const sheetMat=mm(0xccddee);
  const ls=new THREE.Mesh(new THREE.BoxGeometry(0.03,bH*0.8,bD*0.8),sheetMat);ls.position.x=-bW/2+0.04;internals.add(ls);
  const rs2=new THREE.Mesh(new THREE.BoxGeometry(0.03,bH*0.8,bD*0.8),sheetMat.clone());rs2.position.x=bW/2-0.04;internals.add(rs2);
  for(let r=0;r<3;r++)for(let c=0;c<4;c++){const t=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,bW-0.12,6),mm(0x55aadd));t.rotation.z=Math.PI/2;t.position.set(0,-bH*0.25+r*bH*0.25,-bD*0.2+c*bD*0.14);internals.add(t);}
  const baffles=[];
  for(let i=0;i<4;i++){const baffle=new THREE.Group(),xPos=-bW*0.32+i*(bW*0.64/3),isTop=i%2===0;
    const plate=new THREE.Mesh(new THREE.BoxGeometry(0.012,bH*0.55,bD*0.7),mm(0xddaa66));plate.position.y=isTop?-bH*0.1:bH*0.1;baffle.add(plate);
    if(i===1||i===2){const bl=lbl("BAFFLE","#997733",24);bl.position.set(0,isTop?bH*0.55/2+0.12:-bH*0.55/2-0.12,0);bl.scale.set(0.25,0.25,1);bl.visible=false;baffle.add(bl);baffle.userData.baffleLabel=bl;}
    baffle.position.x=xPos;baffle.userData.homeX=xPos;baffles.push(baffle);internals.add(baffle);}
  const tl=lbl("COOLING TUBES","#2277aa",28);tl.position.set(0,bH*0.42,0);tl.scale.set(0.35,0.35,1);tl.visible=false;internals.add(tl);
  g.add(internals);g.userData.internals=internals;g.userData.baffles=baffles;g.userData.tubeLbl=tl;g.userData.bW=bW;
  return g;
}
function buildPump() {
  const g = new THREE.Group(), bodyR=0.35, bodyH=0.5;
  const casing = new THREE.Group();
  casing.add(new THREE.Mesh(new THREE.CylinderGeometry(bodyR,bodyR+0.04,bodyH,18),mm(0x9999cc,{transparent:true,opacity:0.85})));
  const flM=mm(0xaaaadd,{transparent:true,opacity:0.85});
  const tf=new THREE.Mesh(new THREE.CylinderGeometry(bodyR+0.06,bodyR+0.06,0.03,18),flM);tf.position.y=bodyH/2;casing.add(tf);
  const bf=new THREE.Mesh(new THREE.CylinderGeometry(bodyR+0.08,bodyR+0.08,0.03,18),flM.clone());bf.position.y=-bodyH/2;casing.add(bf);
  const cl=lbl("PUMP","#4455aa",44);cl.position.set(0,0,bodyR+0.16);casing.add(cl);
  g.add(casing);g.userData.casing=casing;
  const motorGroup=new THREE.Group();
  motorGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.24,0.35,12),mm(0x8888bb)));
  const mc=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.2,0.04,12),mm(0xaaaacc));mc.position.y=0.18;motorGroup.add(mc);
  const ml=lbl("MOTOR","#555588",28);ml.position.set(0,0,0.28);ml.scale.set(0.35,0.35,1);ml.visible=false;motorGroup.add(ml);
  motorGroup.position.y=bodyH/2+0.2;g.add(motorGroup);g.userData.motorGroup=motorGroup;g.userData.motorLbl=ml;
  const internals=new THREE.Group();
  internals.add(new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,bodyH+0.4,8),mm(0xcccccc)));
  const impeller=new THREE.Group();
  impeller.add(new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.04,12),mm(0xddcc55)));
  const topShroud = new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.26,0.008,18),mm(0xddbb44));
  topShroud.position.y = 0.025; impeller.add(topShroud);
  const botShroud = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.008,18),mm(0xddbb44));
  botShroud.position.y = -0.025; impeller.add(botShroud);
  for(let v=0;v<7;v++){const angle=(v/7)*Math.PI*2;const vane=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.035,0.012),mm(0xeedd55));vane.position.set(Math.cos(angle)*0.13,0,Math.sin(angle)*0.13);vane.rotation.y=-angle+0.4;impeller.add(vane);}
  const il=lbl("IMPELLER","#998822",28);il.position.set(0,0.2,0);il.scale.set(0.3,0.3,1);il.visible=false;impeller.add(il);impeller.userData.impLbl=il;
  internals.add(impeller);
  g.add(internals);g.userData.internals=internals;g.userData.impeller=impeller;g.userData.bodyH=bodyH;
  return g;
}
function buildEnclosure(w,h,d) {
  const g = new THREE.Group(), geo = new THREE.BoxGeometry(w,h,d);
  g.add(new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({color:0xc0ccd8,transparent:true,opacity:0.92,metalness:0.15,roughness:0.6,side:THREE.DoubleSide,depthWrite:false})));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x8899aa,transparent:true,opacity:0.7})));
  return g;
}

  { title: "The Problem: Thermal Pollution", text: "Without treatment, this hot water flows directly into the river, raising water temperatures, lowering dissolved oxygen, and harming aquatic life. This is called thermal pollution." },
  { title: "The Solution: ORC System", text: "An Organic Rankine Cycle (ORC) unit captures the waste heat. Hot water enters at 85°C and exits at just 35°C — cool enough to return to the plant for reuse. A closed loop." },
  { title: "Generating Clean Electricity", text: "The captured heat generates about 150 kW of electricity — enough to power parts of the plant. It's free energy from heat that would otherwise be wasted!" },
  { title: "Inside the ORC System", text: "Use the slider to explore: an organic working fluid is evaporated by hot water, spins a turbine to generate electricity, gets condensed back to liquid, and is pumped back to start again." },
];

  useEffect(() => {

      const ss=Math.max(0,ex-0.25)*2.8,stages=s.turbine.userData.stages,bH=s.turbine.userData.bodyH;if(stages)for(let i=0;i<stages.length;i++){const baseY=-bH*0.38+i*(bH*0.76/(stages.length-1));stages[i].position.y=baseY+(i-(stages.length-1)/2)*ss*0.4;if(stages[i].userData.stageLabel){stages[i].userData.stageLabel.visible=ss>0.2;if(ss>0.2)stages[i].userData.stageLabel.material.opacity=Math.min(1,(ss-0.2)*3);}}}
    if(s.condenser&&s.condenser.userData.casing){const op=Math.max(0,1-ex*2.8),vis=op>0.01;s.condenser.userData.casing.traverse(ch=>{if(ch.material){ch.material.transparent=true;if(ch.material._bo===undefined)ch.material._bo=ch.material.opacity??1;ch.material.opacity=ch.material._bo*op;ch.visible=vis;}});
      const bs=Math.max(0,ex-0.25)*2.5,baffles=s.condenser.userData.baffles;if(baffles)for(let i=0;i<baffles.length;i++){baffles[i].position.x=baffles[i].userData.homeX+(i-(baffles.length-1)/2)*bs*0.3;if(baffles[i].userData.baffleLabel){baffles[i].userData.baffleLabel.visible=bs>0.2;if(bs>0.2)baffles[i].userData.baffleLabel.material.opacity=Math.min(1,(bs-0.2)*3);}}
      if(s.condenser.userData.tubeLbl){const st=bs>0.15;s.condenser.userData.tubeLbl.visible=st;if(st)s.condenser.userData.tubeLbl.material.opacity=Math.min(1,(bs-0.15)*3);}}
    if(s.pump&&s.pump.userData.casing){const op=Math.max(0,1-ex*2.8),vis=op>0.01;s.pump.userData.casing.traverse(ch=>{if(ch.material){ch.material.transparent=true;if(ch.material._bo===undefined)ch.material._bo=ch.material.opacity??1;ch.material.opacity=ch.material._bo*op;ch.visible=vis;}});
      const ml2=Math.max(0,ex-0.3)*2.0;if(s.pump.userData.motorGroup){s.pump.userData.motorGroup.position.y=s.pump.userData.bodyH/2+0.2+ml2;if(s.pump.userData.motorLbl){s.pump.userData.motorLbl.visible=ml2>0.1;if(ml2>0.1)s.pump.userData.motorLbl.material.opacity=Math.min(1,(ml2-0.1)*3);}}
      const id=Math.max(0,ex-0.35)*1.0;if(s.pump.userData.impeller){s.pump.userData.impeller.position.y=-id;const il2=s.pump.userData.impeller.userData.impLbl;if(il2){il2.visible=id>0.05;if(id>0.05)il2.material.opacity=Math.min(1,(id-0.05)*4);}}}
  }, [explode]);

  /* ─── RENDER LOOP ─── */
  useEffect(() => {
    const s = sceneRef.current; if(!s.renderer) return;
    let t = 0;

      frameRef.current = requestAnimationFrame(animate); t += 0.003;
      if(isRotating) camAngle.current.theta += 0.002;
      const{theta,phi,radius}=camAngle.current;
      s.camera.position.set(radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));

            border: `1px solid ${is3D ? "rgba(0,0,0,0.12)" : "rgba(100,180,255,0.4)"}`,
            color: is3D ? "#556" : "#64b5f6",
            padding:"8px 20px", borderRadius:8, fontSize:14, cursor: stage===4?"not-allowed":"pointer",
            opacity: stage===4?0.3:1, transition:"all 0.3s", fontFamily:"inherit",

        </div>

    </div>
  );
