<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORC System — Reducing Thermal Pollution</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a1628;
      color: #e0e8f0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    svg#scene {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Info panel */
    #info-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 22, 40, 0.92);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 16px;
      padding: 18px 32px;
      max-width: 700px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    #info-panel h2 {
      font-size: 18px;
      color: #64b5f6;
      margin-bottom: 6px;
    }

    #info-panel p {
      font-size: 14px;
      line-height: 1.5;
      color: #b0c4de;
    }

    /* Navigation */
    #nav {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 20;
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.4);
      color: #64b5f6;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: rgba(100, 180, 255, 0.3);
      border-color: #64b5f6;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Stage indicators */
    #stages {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .stage-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(100, 180, 255, 0.2);
      border: 1px solid rgba(100, 180, 255, 0.4);
      transition: all 0.4s;
      cursor: pointer;
    }

    .stage-dot.active {
      background: #64b5f6;
      box-shadow: 0 0 12px rgba(100, 180, 255, 0.6);
    }

    .stage-dot.completed {
      background: rgba(100, 180, 255, 0.5);
    }

    /* Title */
    #title {
      position: absolute;
      top: 20px;
      left: 30px;
      z-index: 10;
    }

    #title h1 {
      font-size: 20px;
      font-weight: 600;
      color: #64b5f6;
    }

    #title span {
      font-size: 12px;
      color: #7a9cc6;
    }

    /* Temperature label styles */
    .temp-label {
      font-size: 13px;
      font-weight: 600;
      fill: #fff;
    }

    .label-text {
      font-size: 11px;
      fill: #b0c4de;
      font-weight: 500;
    }

    .component-label {
      font-size: 12px;
      fill: #64b5f6;
      font-weight: 600;
      text-anchor: middle;
    }

    /* Animated water particles */
    .water-particle {
      opacity: 0;
    }

    /* Glow filter for SVG */
    .glow {
      filter: url(#glow-filter);
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="title">
      <h1>Organic Rankine Cycle System</h1>
      <span>Reducing Thermal Pollution at a Food Canning Plant</span>
    </div>

    <div id="stages"></div>

    <svg id="scene" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- Glow filter -->
        <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Water gradient (hot) -->
        <linearGradient id="hot-water" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#ff6b35"/>
          <stop offset="100%" style="stop-color:#ff4444"/>
        </linearGradient>

        <!-- Water gradient (cool) -->
        <linearGradient id="cool-water" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#4fc3f7"/>
          <stop offset="100%" style="stop-color:#2196f3"/>
        </linearGradient>

        <!-- Working fluid gradient -->
        <linearGradient id="fluid-hot" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#ff9800"/>
          <stop offset="100%" style="stop-color:#ff5722"/>
        </linearGradient>

        <linearGradient id="fluid-cool" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#66bb6a"/>
          <stop offset="100%" style="stop-color:#26a69a"/>
        </linearGradient>

        <!-- Building gradient -->
        <linearGradient id="building-grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#37474f"/>
          <stop offset="100%" style="stop-color:#263238"/>
        </linearGradient>

        <!-- Electricity bolt -->
        <linearGradient id="electric" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#ffeb3b"/>
          <stop offset="100%" style="stop-color:#ff9800"/>
        </linearGradient>

        <!-- Animated dash pattern -->
        <pattern id="flow-pattern-hot" width="20" height="6" patternUnits="userSpaceOnUse">
          <rect width="12" height="6" fill="#ff6b35" rx="3"/>
        </pattern>

        <pattern id="flow-pattern-cool" width="20" height="6" patternUnits="userSpaceOnUse">
          <rect width="12" height="6" fill="#4fc3f7" rx="3"/>
        </pattern>
      </defs>

      <!-- ==================== STAGE 1: FACTORY OVERVIEW ==================== -->
      <g id="factory-group">
        <!-- Ground / environment -->
        <rect id="ground" x="0" y="520" width="1200" height="180" fill="#1a2a3a" rx="0"/>

        <!-- River/water body on the right -->
        <g id="river">
          <path d="M 950 520 Q 1000 500, 1050 520 Q 1100 540, 1150 520 L 1200 520 L 1200 700 L 950 700 Z"
                fill="#1565c0" opacity="0.4"/>
          <text x="1075" y="580" text-anchor="middle" class="label-text" opacity="0.7">River</text>
        </g>

        <!-- Main factory building -->
        <g id="factory-building">
          <rect x="100" y="260" width="350" height="260" fill="url(#building-grad)" rx="4" stroke="#546e7a" stroke-width="1"/>
          <!-- Roof -->
          <polygon points="90,260 275,190 460,260" fill="#455a64" stroke="#546e7a" stroke-width="1"/>
          <!-- Windows -->
          <rect x="130" y="300" width="50" height="40" fill="#1a237e" opacity="0.6" rx="2"/>
          <rect x="200" y="300" width="50" height="40" fill="#1a237e" opacity="0.6" rx="2"/>
          <rect x="270" y="300" width="50" height="40" fill="#1a237e" opacity="0.6" rx="2"/>
          <rect x="340" y="300" width="50" height="40" fill="#1a237e" opacity="0.6" rx="2"/>
          <!-- Light in windows -->
          <rect x="132" y="302" width="46" height="36" fill="#ffcc02" opacity="0.15" rx="1"/>
          <rect x="202" y="302" width="46" height="36" fill="#ffcc02" opacity="0.15" rx="1"/>
          <rect x="272" y="302" width="46" height="36" fill="#ffcc02" opacity="0.15" rx="1"/>
          <rect x="342" y="302" width="46" height="36" fill="#ffcc02" opacity="0.15" rx="1"/>
          <!-- Door -->
          <rect x="220" y="430" width="60" height="90" fill="#1a237e" opacity="0.5" rx="2"/>
          <!-- Smokestacks -->
          <rect x="160" y="180" width="25" height="80" fill="#455a64" rx="2"/>
          <rect x="330" y="200" width="25" height="60" fill="#455a64" rx="2"/>
          <!-- Steam from stacks -->
          <g id="steam1" opacity="0.3">
            <circle cx="172" cy="170" r="8" fill="#90a4ae"/>
            <circle cx="168" cy="155" r="10" fill="#90a4ae"/>
            <circle cx="175" cy="138" r="7" fill="#90a4ae"/>
          </g>
          <g id="steam2" opacity="0.2">
            <circle cx="342" cy="190" r="6" fill="#90a4ae"/>
            <circle cx="338" cy="178" r="8" fill="#90a4ae"/>
          </g>
          <!-- Label -->
          <text x="275" y="390" text-anchor="middle" class="component-label" font-size="14">Food Canning</text>
          <text x="275" y="408" text-anchor="middle" class="component-label" font-size="14">Plant</text>
        </g>

        <!-- Hot water outflow pipe (from factory) -->
        <g id="hot-outflow" opacity="0">
          <!-- Pipe -->
          <line x1="450" y1="470" x2="620" y2="470" stroke="#546e7a" stroke-width="14" stroke-linecap="round"/>
          <line x1="450" y1="470" x2="620" y2="470" stroke="url(#hot-water)" stroke-width="8" stroke-linecap="round"
                stroke-dasharray="12 8" class="hot-flow"/>
          <!-- Temperature label -->
          <rect x="490" y="438" width="70" height="22" fill="rgba(255,107,53,0.2)" rx="11" stroke="#ff6b35" stroke-width="1"/>
          <text x="525" y="453" text-anchor="middle" class="temp-label" fill="#ff6b35" font-size="12">85°C</text>
          <text x="535" y="495" text-anchor="middle" class="label-text">Hot Water Outflow</text>
        </g>

        <!-- Wavy arrow going to river (original, no ORC) -->
        <g id="direct-to-river" opacity="0">
          <path d="M 620 470 Q 700 460, 750 470 Q 800 480, 850 470 Q 900 460, 940 470"
                stroke="#ff6b35" stroke-width="4" fill="none" stroke-dasharray="8 4" class="hot-flow-river"/>
          <polygon points="940,462 955,470 940,478" fill="#ff6b35"/>
          <text x="780" y="450" text-anchor="middle" class="label-text" fill="#ff8a65">Hot water flows directly to river!</text>
          <text x="780" y="430" text-anchor="middle" font-size="13" fill="#ff5252" font-weight="600">Thermal Pollution</text>
        </g>
      </g>

      <!-- ==================== STAGE 2: ORC SYSTEM (exterior box) ==================== -->
      <g id="orc-exterior" opacity="0">
        <!-- ORC Unit box -->
        <rect id="orc-box" x="600" y="340" width="220" height="160" fill="#1a3a4a" rx="8"
              stroke="#4fc3f7" stroke-width="2"/>
        <rect x="600" y="340" width="220" height="30" fill="rgba(79,195,247,0.1)" rx="8"/>
        <text x="710" y="362" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="600">ORC Unit</text>

        <!-- Blinking status light -->
        <circle id="status-light" cx="800" cy="355" r="5" fill="#4caf50"/>

        <!-- Hot water pipe INTO orc -->
        <line x1="450" y1="470" x2="600" y2="420" stroke="#546e7a" stroke-width="14" stroke-linecap="round"/>
        <line id="pipe-hot-in" x1="450" y1="470" x2="600" y2="420" stroke="url(#hot-water)" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="12 8"/>
        <rect x="490" y="418" width="70" height="22" fill="rgba(255,107,53,0.2)" rx="11" stroke="#ff6b35" stroke-width="1"/>
        <text x="525" y="433" text-anchor="middle" class="temp-label" fill="#ff6b35" font-size="12">85°C</text>

        <!-- Cool water pipe OUT of orc to river -->
        <line x1="820" y1="450" x2="950" y2="500" stroke="#546e7a" stroke-width="14" stroke-linecap="round"/>
        <line id="pipe-cool-out" x1="820" y1="450" x2="950" y2="500" stroke="url(#cool-water)" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="12 8"/>
        <rect x="860" y="445" width="70" height="22" fill="rgba(79,195,247,0.2)" rx="11" stroke="#4fc3f7" stroke-width="1"/>
        <text x="895" y="460" text-anchor="middle" class="temp-label" fill="#4fc3f7" font-size="12">35°C</text>

        <!-- "Safe for river" label -->
        <text x="920" y="530" text-anchor="middle" class="label-text" fill="#66bb6a">Cooled water safe for river</text>
      </g>

      <!-- ==================== STAGE 3: ELECTRICITY OUTPUT ==================== -->
      <g id="electricity-group" opacity="0">
        <!-- Power line from ORC -->
        <line x1="710" y1="340" x2="710" y2="240" stroke="#ffeb3b" stroke-width="3" stroke-dasharray="6 4"/>
        <line x1="710" y1="240" x2="880" y2="240" stroke="#ffeb3b" stroke-width="3" stroke-dasharray="6 4"/>

        <!-- Lightning bolt icon -->
        <g id="bolt" transform="translate(870, 200)">
          <polygon points="10,0 0,22 12,22 5,42 25,16 14,16 22,0" fill="url(#electric)" class="glow"/>
        </g>

        <!-- Power meter / display -->
        <rect x="850" y="200" width="120" height="60" fill="#1a2a1a" rx="8" stroke="#66bb6a" stroke-width="1.5"/>
        <text x="910" y="225" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="600">POWER OUTPUT</text>
        <text id="power-value" x="910" y="248" text-anchor="middle" fill="#76ff03" font-size="20" font-weight="700">0 kW</text>

        <!-- Grid / houses icon -->
        <g transform="translate(900, 270)">
          <text x="10" y="15" font-size="11" fill="#b0c4de" text-anchor="middle">Powers nearby buildings</text>
        </g>
      </g>

      <!-- ==================== STAGE 4: EXPLODED ORC VIEW ==================== -->
      <g id="orc-exploded" opacity="0">
        <!-- Background panel -->
        <rect x="100" y="80" width="1000" height="560" fill="rgba(15,25,45,0.95)" rx="16"
              stroke="rgba(100,180,255,0.2)" stroke-width="1"/>

        <text x="600" y="120" text-anchor="middle" fill="#64b5f6" font-size="20" font-weight="700">
          Inside the ORC System
        </text>
        <text x="600" y="142" text-anchor="middle" fill="#7a9cc6" font-size="13">
          How an Organic Rankine Cycle converts waste heat into electricity
        </text>

        <!-- EVAPORATOR -->
        <g id="comp-evaporator">
          <rect x="160" y="250" width="160" height="100" fill="#2a1a0a" rx="10" stroke="#ff9800" stroke-width="2"/>
          <text x="240" y="230" text-anchor="middle" class="component-label" fill="#ff9800" font-size="14">EVAPORATOR</text>
          <text x="240" y="290" text-anchor="middle" fill="#ffcc80" font-size="11">Hot water heats</text>
          <text x="240" y="306" text-anchor="middle" fill="#ffcc80" font-size="11">the working fluid</text>
          <text x="240" y="325" text-anchor="middle" fill="#ffcc80" font-size="11">into a vapor</text>
          <!-- Hot water in arrow -->
          <line x1="120" y1="280" x2="158" y2="280" stroke="#ff6b35" stroke-width="4" marker-end="url(#arrow-hot)"/>
          <text x="110" y="268" text-anchor="end" fill="#ff6b35" font-size="10" font-weight="600">Hot Water In</text>
          <text x="110" y="292" text-anchor="end" fill="#ff8a65" font-size="10">85°C</text>
          <!-- Cooled water out -->
          <line x1="120" y1="320" x2="158" y2="320" stroke="#4fc3f7" stroke-width="4"/>
          <text x="110" y="316" text-anchor="end" fill="#4fc3f7" font-size="10" font-weight="600">Cool Water Out</text>
          <text x="110" y="336" text-anchor="end" fill="#81d4fa" font-size="10">35°C</text>
        </g>

        <!-- Arrow: Evaporator -> Turbine (vapor) -->
        <g id="flow-evap-turb">
          <line x1="322" y1="285" x2="410" y2="285" stroke="#ff9800" stroke-width="4"
                stroke-dasharray="8 4"/>
          <polygon points="408,278 422,285 408,292" fill="#ff9800"/>
          <text x="366" y="275" text-anchor="middle" fill="#ffcc80" font-size="10">Hot Vapor</text>
        </g>

        <!-- TURBINE -->
        <g id="comp-turbine">
          <circle cx="490" cy="285" r="55" fill="#1a2a3a" stroke="#42a5f5" stroke-width="2"/>
          <!-- Turbine blades -->
          <g transform="translate(490, 285)">
            <line x1="0" y1="-40" x2="0" y2="40" stroke="#42a5f5" stroke-width="2"/>
            <line x1="-35" y1="-20" x2="35" y2="20" stroke="#42a5f5" stroke-width="2"/>
            <line x1="-35" y1="20" x2="35" y2="-20" stroke="#42a5f5" stroke-width="2"/>
            <circle cx="0" cy="0" r="8" fill="#42a5f5" opacity="0.3"/>
          </g>
          <text x="490" y="226" text-anchor="middle" class="component-label" fill="#42a5f5" font-size="14">TURBINE</text>
          <text x="490" y="360" text-anchor="middle" fill="#90caf9" font-size="11">Vapor spins</text>
          <text x="490" y="376" text-anchor="middle" fill="#90caf9" font-size="11">the turbine</text>
        </g>

        <!-- Arrow: Turbine -> Generator (shaft) -->
        <g id="flow-turb-gen">
          <line x1="547" y1="285" x2="610" y2="285" stroke="#42a5f5" stroke-width="4"/>
          <rect x="565" y="278" width="30" height="14" fill="none" stroke="#42a5f5" stroke-width="1.5" rx="3"/>
          <text x="580" y="272" text-anchor="middle" fill="#90caf9" font-size="9">Shaft</text>
        </g>

        <!-- GENERATOR -->
        <g id="comp-generator">
          <rect x="614" y="250" width="120" height="70" fill="#1a2a1a" rx="10" stroke="#66bb6a" stroke-width="2"/>
          <text x="674" y="230" text-anchor="middle" class="component-label" fill="#66bb6a" font-size="14">GENERATOR</text>
          <text x="674" y="280" text-anchor="middle" fill="#a5d6a7" font-size="11">Spinning turbine</text>
          <text x="674" y="296" text-anchor="middle" fill="#a5d6a7" font-size="11">makes electricity!</text>
          <!-- Lightning bolts -->
          <g transform="translate(700, 322)">
            <polygon points="5,0 0,11 6,11 2,22 14,8 8,8 12,0" fill="#ffeb3b" class="glow"/>
          </g>
          <text x="674" y="358" text-anchor="middle" fill="#76ff03" font-size="13" font-weight="700" id="exploded-power">Electricity Output</text>
        </g>

        <!-- Arrow: Turbine -> Condenser (used vapor) -->
        <g id="flow-turb-cond">
          <path d="M 490 342 L 490 450 L 674 450" fill="none" stroke="#26a69a" stroke-width="4"
                stroke-dasharray="8 4"/>
          <polygon points="672,443 686,450 672,457" fill="#26a69a"/>
          <text x="560" y="440" text-anchor="middle" fill="#80cbc4" font-size="10">Cooled Vapor</text>
        </g>

        <!-- CONDENSER -->
        <g id="comp-condenser">
          <rect x="690" y="420" width="160" height="80" fill="#0a2a2a" rx="10" stroke="#26a69a" stroke-width="2"/>
          <text x="770" y="410" text-anchor="middle" class="component-label" fill="#26a69a" font-size="14">CONDENSER</text>
          <text x="770" y="450" text-anchor="middle" fill="#80cbc4" font-size="11">Cools the vapor</text>
          <text x="770" y="466" text-anchor="middle" fill="#80cbc4" font-size="11">back into liquid</text>
          <text x="770" y="490" text-anchor="middle" fill="#80cbc4" font-size="10">(using air or cool water)</text>
        </g>

        <!-- Arrow: Condenser -> Pump -->
        <g id="flow-cond-pump">
          <line x1="852" y1="460" x2="920" y2="460" stroke="#66bb6a" stroke-width="4"
                stroke-dasharray="8 4"/>
          <polygon points="918,453 932,460 918,467" fill="#66bb6a"/>
          <text x="886" y="448" text-anchor="middle" fill="#a5d6a7" font-size="10">Liquid</text>
        </g>

        <!-- PUMP -->
        <g id="comp-pump">
          <circle cx="980" cy="460" r="40" fill="#1a1a2a" stroke="#7e57c2" stroke-width="2"/>
          <text x="980" y="415" text-anchor="middle" class="component-label" fill="#7e57c2" font-size="14">PUMP</text>
          <text x="980" y="458" text-anchor="middle" fill="#b39ddb" font-size="11">Pushes liquid</text>
          <text x="980" y="474" text-anchor="middle" fill="#b39ddb" font-size="11">back to start</text>
          <!-- Circular arrow inside -->
          <path d="M 970 445 A 12 12 0 1 1 990 445" fill="none" stroke="#7e57c2" stroke-width="2"/>
          <polygon points="990,443 994,449 987,449" fill="#7e57c2"/>
        </g>

        <!-- Arrow: Pump -> Evaporator (completing the loop) -->
        <g id="flow-pump-evap">
          <path d="M 980 502 L 980 560 L 240 560 L 240 352" fill="none" stroke="#7e57c2" stroke-width="4"
                stroke-dasharray="8 4"/>
          <polygon points="233,354 240,340 247,354" fill="#7e57c2"/>
          <text x="600" y="552" text-anchor="middle" fill="#b39ddb" font-size="11">Liquid flows back to evaporator — the cycle repeats!</text>
        </g>

        <!-- Cycle label in center -->
        <g id="cycle-label" opacity="0.6">
          <text x="600" y="170" text-anchor="middle" fill="#546e7a" font-size="11">
            The "organic" in ORC refers to the working fluid — an organic compound (like refrigerant) that boils at a lower temperature than water
          </text>
        </g>
      </g>

      <!-- Arrowhead markers -->
      <defs>
        <marker id="arrow-hot" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b35"/>
        </marker>
      </defs>
    </svg>

    <!-- Info Panel -->
    <div id="info-panel">
      <h2 id="info-title">Welcome</h2>
      <p id="info-text">Click "Next" to explore how an ORC system reduces thermal pollution from a food canning plant.</p>
    </div>

    <!-- Navigation -->
    <div id="nav">
      <button class="nav-btn" id="btn-prev" disabled>&#8592; Back</button>
      <button class="nav-btn" id="btn-next">Next &#8594;</button>
    </div>
  </div>

  <script>
    // ======================== STATE ========================
    let currentStage = 0;
    const totalStages = 5; // 0-4

    const stageInfo = [
      {
        title: "The Food Canning Plant",
        text: "This food canning plant uses large amounts of hot water to sterilize cans and process food. The water comes out at about 85°C (185°F) — too hot to put back in the river safely."
      },
      {
        title: "The Problem: Thermal Pollution",
        text: "Without treatment, this hot water flows directly into the river. This raises the river temperature, which lowers oxygen levels and can harm fish and other aquatic life. This is called thermal pollution."
      },
      {
        title: "The Solution: ORC System",
        text: "An Organic Rankine Cycle (ORC) unit captures the heat from the hot water. The water enters at 85°C and exits at just 35°C (95°F) — cool enough for the river. The captured heat energy is converted to electricity!"
      },
      {
        title: "Generating Clean Electricity",
        text: "The ORC system generates about 150 kW of electricity from the waste heat — enough to power parts of the plant or nearby buildings. It's free energy from heat that would otherwise be wasted!"
      },
      {
        title: "Inside the ORC System",
        text: "The ORC works like a refrigerator in reverse: an organic fluid is evaporated by hot water, spins a turbine to generate electricity, gets condensed back to liquid, and is pumped back to start again. The cycle repeats continuously!"
      }
    ];

    // ======================== INIT ========================
    const stagesEl = document.getElementById('stages');
    for (let i = 0; i < totalStages; i++) {
      const dot = document.createElement('div');
      dot.className = 'stage-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goToStage(i));
      stagesEl.appendChild(dot);
    }

    // ======================== NAVIGATION ========================
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentStage < totalStages - 1) goToStage(currentStage + 1);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStage > 0) goToStage(currentStage - 1);
    });

    function goToStage(stage) {
      if (stage === currentStage) return;
      const prev = currentStage;
      currentStage = stage;

      // Update dots
      document.querySelectorAll('.stage-dot').forEach((dot, i) => {
        dot.className = 'stage-dot' + (i === stage ? ' active' : i < stage ? ' completed' : '');
      });

      // Update buttons
      document.getElementById('btn-prev').disabled = stage === 0;
      document.getElementById('btn-next').disabled = stage === totalStages - 1;

      // Update info
      updateInfo(stage);

      // Animate
      animateStage(stage, prev);
    }

    function updateInfo(stage) {
      const info = stageInfo[stage];
      const titleEl = document.getElementById('info-title');
      const textEl = document.getElementById('info-text');
      gsap.to('#info-panel', {
        opacity: 0, duration: 0.2, onComplete: () => {
          titleEl.textContent = info.title;
          textEl.textContent = info.text;
          gsap.to('#info-panel', { opacity: 1, duration: 0.3 });
        }
      });
    }

    // ======================== ANIMATIONS ========================
    let flowTimeline = null;
    let powerInterval = null;

    function animateStage(stage, prev) {
      // Kill running animations
      gsap.killTweensOf('.hot-flow, .hot-flow-river, #pipe-hot-in, #pipe-cool-out');
      if (flowTimeline) { flowTimeline.kill(); flowTimeline = null; }
      if (powerInterval) { clearInterval(powerInterval); powerInterval = null; }

      switch (stage) {
        case 0: showStage0(prev); break;
        case 1: showStage1(prev); break;
        case 2: showStage2(prev); break;
        case 3: showStage3(prev); break;
        case 4: showStage4(prev); break;
      }
    }

    // Stage 0: Just the factory
    function showStage0(prev) {
      gsap.to('#hot-outflow', { opacity: 0, duration: 0.4 });
      gsap.to('#direct-to-river', { opacity: 0, duration: 0.4 });
      gsap.to('#orc-exterior', { opacity: 0, duration: 0.4 });
      gsap.to('#electricity-group', { opacity: 0, duration: 0.4 });
      gsap.to('#orc-exploded', { opacity: 0, duration: 0.5 });
      gsap.to('#factory-group', { opacity: 1, duration: 0.5 });
      animateSteam();
    }

    // Stage 1: Show hot water flowing to river (the problem)
    function showStage1(prev) {
      gsap.to('#orc-exterior', { opacity: 0, duration: 0.3 });
      gsap.to('#electricity-group', { opacity: 0, duration: 0.3 });
      gsap.to('#orc-exploded', { opacity: 0, duration: 0.5 });
      gsap.to('#factory-group', { opacity: 1, duration: 0.3 });
      gsap.to('#hot-outflow', { opacity: 1, duration: 0.5, delay: 0.2 });
      gsap.to('#direct-to-river', { opacity: 1, duration: 0.5, delay: 0.5 });
      animateFlowDashes('.hot-flow', 20);
      animateFlowDashes('.hot-flow-river', 20, 0.3);
      animateSteam();
    }

    // Stage 2: ORC system installed
    function showStage2(prev) {
      gsap.to('#direct-to-river', { opacity: 0, duration: 0.4 });
      gsap.to('#orc-exploded', { opacity: 0, duration: 0.5 });
      gsap.to('#electricity-group', { opacity: 0, duration: 0.3 });
      gsap.to('#factory-group', { opacity: 1, duration: 0.3 });
      gsap.to('#hot-outflow', { opacity: 0, duration: 0.3 }); // hide simple outflow, orc-exterior has its own pipes
      gsap.to('#orc-exterior', { opacity: 1, duration: 0.6, delay: 0.3 });
      animateFlowDashes('#pipe-hot-in', 20, 0.3);
      animateFlowDashes('#pipe-cool-out', 20, 0.5);
      animateStatusLight();
      animateSteam();
    }

    // Stage 3: Electricity output
    function showStage3(prev) {
      gsap.to('#direct-to-river', { opacity: 0, duration: 0.3 });
      gsap.to('#orc-exploded', { opacity: 0, duration: 0.5 });
      gsap.to('#hot-outflow', { opacity: 0, duration: 0.3 });
      gsap.to('#factory-group', { opacity: 1, duration: 0.3 });
      gsap.to('#orc-exterior', { opacity: 1, duration: 0.3 });
      gsap.to('#electricity-group', { opacity: 1, duration: 0.6, delay: 0.3 });
      animateFlowDashes('#pipe-hot-in', 20);
      animateFlowDashes('#pipe-cool-out', 20);
      animateStatusLight();
      animatePowerCounter();
      animateBolt();
      animateSteam();
    }

    // Stage 4: Exploded ORC view
    function showStage4(prev) {
      // Fade out overview
      gsap.to('#factory-group', { opacity: 0, duration: 0.6 });
      gsap.to('#orc-exterior', { opacity: 0, duration: 0.6 });
      gsap.to('#electricity-group', { opacity: 0, duration: 0.6 });
      gsap.to('#hot-outflow', { opacity: 0, duration: 0.4 });
      gsap.to('#direct-to-river', { opacity: 0, duration: 0.4 });

      // Reveal exploded view with staggered components
      gsap.to('#orc-exploded', { opacity: 1, duration: 0.5, delay: 0.5 });

      // Stagger each component
      const components = ['#comp-evaporator', '#flow-evap-turb', '#comp-turbine', '#flow-turb-gen',
                          '#comp-generator', '#flow-turb-cond', '#comp-condenser', '#flow-cond-pump',
                          '#comp-pump', '#flow-pump-evap', '#cycle-label'];

      components.forEach((sel, i) => {
        gsap.fromTo(sel, { opacity: 0, y: 15 }, { opacity: 1, y: 0, duration: 0.4, delay: 0.7 + i * 0.15 });
      });

      // Animate turbine spinning
      animateTurbineSpin();

      // Animate dashed flow lines
      setTimeout(() => {
        animateFlowDashes('#flow-evap-turb line', 20, 0);
        animateFlowDashes('#flow-turb-cond path', 20, 0);
        animateFlowDashes('#flow-cond-pump line', 20, 0);
        animateFlowDashes('#flow-pump-evap path', 20, 0);
      }, 1500);
    }

    // ======================== ANIMATION HELPERS ========================
    function animateFlowDashes(selector, dashLen, delay = 0) {
      gsap.to(selector, {
        strokeDashoffset: -dashLen,
        duration: 0.5,
        repeat: -1,
        ease: 'none',
        delay: delay
      });
    }

    function animateSteam() {
      gsap.to('#steam1', { y: -8, opacity: 0.15, duration: 2, repeat: -1, yoyo: true, ease: 'sine.inOut' });
      gsap.to('#steam2', { y: -6, opacity: 0.1, duration: 2.5, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.5 });
    }

    function animateStatusLight() {
      gsap.to('#status-light', {
        opacity: 0.3, duration: 0.8, repeat: -1, yoyo: true, ease: 'sine.inOut'
      });
    }

    function animatePowerCounter() {
      let val = 0;
      const target = 150;
      const el = document.getElementById('power-value');
      powerInterval = setInterval(() => {
        val += 3;
        if (val >= target) { val = target; clearInterval(powerInterval); }
        el.textContent = val + ' kW';
      }, 30);
    }

    function animateBolt() {
      gsap.to('#bolt', {
        opacity: 0.4, duration: 0.3, repeat: -1, yoyo: true, ease: 'steps(1)'
      });
    }

    function animateTurbineSpin() {
      const blades = document.querySelector('#comp-turbine g');
      if (blades) {
        gsap.to(blades, { rotation: 360, duration: 2, repeat: -1, ease: 'none', transformOrigin: 'center center' });
      }
    }

    // ======================== KEYBOARD NAV ========================
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        if (currentStage < totalStages - 1) goToStage(currentStage + 1);
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (currentStage > 0) goToStage(currentStage - 1);
      }
    });

    // ======================== START ========================
    animateSteam();
  </script>
</body>
</html>
