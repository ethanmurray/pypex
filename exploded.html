<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORC Exploded View — Slider POC</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #080e1a;
      color: #e0e8f0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg#scene {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Slider bar at bottom */
    #slider-bar {
      height: 80px;
      background: rgba(12, 20, 35, 0.95);
      border-top: 1px solid rgba(100, 180, 255, 0.15);
      display: flex;
      align-items: center;
      padding: 0 40px;
      gap: 20px;
      flex-shrink: 0;
    }

    #slider-bar label {
      font-size: 13px;
      color: #7a9cc6;
      white-space: nowrap;
      min-width: 80px;
    }

    #slider-bar .label-right {
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 8px;
      background: rgba(100, 180, 255, 0.12);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #64b5f6;
      border: 3px solid #1a3050;
      box-shadow: 0 0 16px rgba(100, 180, 255, 0.4);
      cursor: grab;
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:active {
      cursor: grabbing;
      box-shadow: 0 0 24px rgba(100, 180, 255, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #64b5f6;
      border: 3px solid #1a3050;
      box-shadow: 0 0 16px rgba(100, 180, 255, 0.4);
      cursor: grab;
    }

    #progress-label {
      font-size: 14px;
      color: #64b5f6;
      font-weight: 600;
      min-width: 44px;
      text-align: center;
    }

    /* Title */
    #title {
      position: absolute;
      top: 20px;
      left: 30px;
      z-index: 10;
      pointer-events: none;
    }

    #title h1 {
      font-size: 20px;
      font-weight: 600;
      color: #64b5f6;
    }

    #title span {
      font-size: 12px;
      color: #546e7a;
    }

    /* Component name tooltip */
    #tooltip {
      position: absolute;
      top: 20px;
      right: 30px;
      text-align: right;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s;
    }

    #tooltip .name {
      font-size: 16px;
      font-weight: 600;
      color: #64b5f6;
    }

    #tooltip .desc {
      font-size: 12px;
      color: #7a9cc6;
      max-width: 280px;
      margin-left: auto;
    }
  </style>
</head>
<body>

  <div id="scene-container">
    <div id="title">
      <h1>ORC System — Exploded View</h1>
      <span>Drag the slider to explore the components</span>
    </div>

    <div id="tooltip">
      <div class="name" id="tip-name"></div>
      <div class="desc" id="tip-desc"></div>
    </div>

    <svg id="scene" viewBox="0 0 1400 750" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Clipping rect for evaporator interior (reveals as shell opens) -->
        <clipPath id="evap-interior-clip">
          <rect id="evap-clip-rect" x="120" y="280" width="280" height="200"/>
        </clipPath>
      </defs>

      <!-- ============ CONNECTING LINES (behind everything) ============ -->
      <!-- These appear as components separate -->
      <g id="connect-lines" opacity="0">
        <!-- Evaporator -> Turbine -->
        <line id="conn-evap-turb" x1="400" y1="380" x2="500" y2="380"
              stroke="#ff9800" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
        <text id="conn-label-1" x="450" y="370" text-anchor="middle" font-size="10" fill="#ff9800" opacity="0.7">vapor →</text>

        <!-- Turbine -> Generator -->
        <line id="conn-turb-gen" x1="660" y1="380" x2="740" y2="380"
              stroke="#42a5f5" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
        <text id="conn-label-2" x="700" y="370" text-anchor="middle" font-size="10" fill="#42a5f5" opacity="0.7">shaft →</text>

        <!-- Generator -> Condenser -->
        <line id="conn-gen-cond" x1="920" y1="380" x2="1000" y2="380"
              stroke="#26a69a" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
        <text id="conn-label-3" x="960" y="370" text-anchor="middle" font-size="10" fill="#26a69a" opacity="0.7">exhaust →</text>
      </g>

      <!-- ============ EVAPORATOR (compound group) ============ -->
      <g id="evaporator">

        <!-- Top shell half -->
        <g id="evap-shell-top">
          <path d="M 160 290 L 160 280 Q 160 270, 170 270 L 370 270 Q 380 270, 380 280 L 380 290 Z"
                fill="#2a1a0a" stroke="#ff9800" stroke-width="1.5"/>
          <!-- Bolts on top -->
          <circle cx="180" cy="280" r="3" fill="#546e7a"/>
          <circle cx="360" cy="280" r="3" fill="#546e7a"/>
          <!-- Top flange line -->
          <line x1="160" y1="290" x2="380" y2="290" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
        </g>

        <!-- Bottom shell half -->
        <g id="evap-shell-bottom">
          <path d="M 160 470 L 160 480 Q 160 490, 170 490 L 370 490 Q 380 490, 380 480 L 380 470 Z"
                fill="#2a1a0a" stroke="#ff9800" stroke-width="1.5"/>
          <circle cx="180" cy="480" r="3" fill="#546e7a"/>
          <circle cx="360" cy="480" r="3" fill="#546e7a"/>
          <line x1="160" y1="470" x2="380" y2="470" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
        </g>

        <!-- Main body (side walls) -->
        <g id="evap-body">
          <line id="evap-wall-left" x1="160" y1="290" x2="160" y2="470" stroke="#ff9800" stroke-width="1.5"/>
          <line id="evap-wall-right" x1="380" y1="290" x2="380" y2="470" stroke="#ff9800" stroke-width="1.5"/>
          <rect x="161" y="291" width="218" height="178" fill="#2a1a0a" opacity="0.8"/>
        </g>

        <!-- Interior pipes (clipped to body area, revealed as shell opens) -->
        <g id="evap-interior" clip-path="url(#evap-interior-clip)">

          <!-- HOT WATER PIPES (orange/red tubes - horizontal) -->
          <g id="hot-water-pipes">
            <!-- Inlet header (left side vertical pipe) -->
            <rect x="165" y="310" width="12" height="140" fill="#c62828" rx="4" opacity="0.9"/>
            <!-- Horizontal tubes -->
            <line x1="177" y1="325" x2="365" y2="325" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
            <line x1="177" y1="350" x2="365" y2="350" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
            <line x1="177" y1="375" x2="365" y2="375" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
            <line x1="177" y1="400" x2="365" y2="400" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
            <line x1="177" y1="425" x2="365" y2="425" stroke="#e53935" stroke-width="6" stroke-linecap="round"/>
            <!-- Outlet header (right side vertical pipe) -->
            <rect x="363" y="310" width="12" height="140" fill="#c62828" rx="4" opacity="0.9"/>
            <!-- Inner bore highlight -->
            <line x1="177" y1="325" x2="365" y2="325" stroke="#ff8a65" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <line x1="177" y1="350" x2="365" y2="350" stroke="#ff8a65" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <line x1="177" y1="375" x2="365" y2="375" stroke="#ff8a65" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <line x1="177" y1="400" x2="365" y2="400" stroke="#ff8a65" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <line x1="177" y1="425" x2="365" y2="425" stroke="#ff8a65" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
            <!-- Label -->
            <text id="label-hot-pipes" x="270" y="460" text-anchor="middle" font-size="11" fill="#ff8a65" font-weight="600" opacity="0">
              Hot Water Tubes (85°C)
            </text>
          </g>

          <!-- WORKING FLUID PIPES (green/teal - weaving between hot pipes) -->
          <g id="fluid-pipes">
            <!-- Fluid shell / baffles (surrounds the hot tubes) -->
            <path d="M 190 315 Q 270 308, 350 315 L 350 337 Q 270 330, 190 337 Z" fill="#00695c" opacity="0.35"/>
            <path d="M 190 340 Q 270 333, 350 340 L 350 362 Q 270 355, 190 362 Z" fill="#00695c" opacity="0.35"/>
            <path d="M 190 365 Q 270 358, 350 365 L 350 387 Q 270 380, 190 387 Z" fill="#00695c" opacity="0.35"/>
            <path d="M 190 390 Q 270 383, 350 390 L 350 412 Q 270 405, 190 412 Z" fill="#00695c" opacity="0.35"/>
            <path d="M 190 415 Q 270 408, 350 415 L 350 437 Q 270 430, 190 437 Z" fill="#00695c" opacity="0.35"/>
            <!-- Baffle plates -->
            <line x1="220" y1="308" x2="220" y2="442" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.5"/>
            <line x1="270" y1="308" x2="270" y2="442" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.5"/>
            <line x1="320" y1="308" x2="320" y2="442" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.5"/>
            <!-- Label -->
            <text id="label-fluid-pipes" x="270" y="302" text-anchor="middle" font-size="11" fill="#80cbc4" font-weight="600" opacity="0">
              Working Fluid Shell (boils here)
            </text>
          </g>
        </g>

        <!-- Evaporator label -->
        <text id="evap-label" x="270" y="260" text-anchor="middle" font-size="15" fill="#ff9800" font-weight="700" opacity="0">
          EVAPORATOR
        </text>
        <text id="evap-sublabel" x="270" y="510" text-anchor="middle" font-size="11" fill="#ffcc80" opacity="0">
          Shell-and-tube heat exchanger
        </text>

        <!-- Input/output port labels -->
        <g id="evap-ports" opacity="0">
          <text x="140" y="340" text-anchor="end" font-size="10" fill="#ff6b35">Hot Water In →</text>
          <text x="140" y="430" text-anchor="end" font-size="10" fill="#4fc3f7">← Cool Water Out</text>
          <text x="400" y="320" text-anchor="start" font-size="10" fill="#80cbc4">← Fluid In (liquid)</text>
          <text x="400" y="440" text-anchor="start" font-size="10" fill="#ff9800">Vapor Out →</text>
        </g>
      </g>

      <!-- ============ TURBINE ============ -->
      <g id="turbine">
        <!-- Housing -->
        <rect x="500" y="310" width="160" height="140" fill="#0d1b2a" rx="12"
              stroke="#42a5f5" stroke-width="1.5"/>
        <!-- Scroll / volute shape -->
        <path d="M 530 340 Q 580 320, 630 340 Q 650 355, 640 380 Q 630 410, 580 420 Q 540 415, 530 390"
              fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
        <!-- Rotor / blades -->
        <g id="turbine-rotor" transform="translate(580, 380)">
          <circle cx="0" cy="0" r="35" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
          <line x1="0" y1="-30" x2="0" y2="30" stroke="#64b5f6" stroke-width="2.5"/>
          <line x1="-26" y1="-15" x2="26" y2="15" stroke="#64b5f6" stroke-width="2.5"/>
          <line x1="-26" y1="15" x2="26" y2="-15" stroke="#64b5f6" stroke-width="2.5"/>
          <line x1="-15" y1="-26" x2="15" y2="26" stroke="#64b5f6" stroke-width="2.5"/>
          <line x1="15" y1="-26" x2="-15" y2="26" stroke="#64b5f6" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="8" fill="#42a5f5" opacity="0.3"/>
          <circle cx="0" cy="0" r="3" fill="#64b5f6"/>
        </g>
        <!-- Shaft stub (right side) -->
        <rect x="656" y="374" width="20" height="12" fill="#37474f" rx="2" stroke="#42a5f5" stroke-width="1"/>
        <!-- Label -->
        <text id="turbine-label" x="580" y="298" text-anchor="middle" font-size="15" fill="#42a5f5" font-weight="700" opacity="0">
          TURBINE
        </text>
        <text id="turbine-sublabel" x="580" y="468" text-anchor="middle" font-size="11" fill="#90caf9" opacity="0">
          Vapor spins the blades
        </text>
      </g>

      <!-- ============ GENERATOR ============ -->
      <g id="generator">
        <!-- Housing -->
        <rect x="740" y="320" width="180" height="120" fill="#0a1a0a" rx="12"
              stroke="#66bb6a" stroke-width="1.5"/>
        <!-- Stator coils (outer) -->
        <ellipse cx="830" cy="380" rx="70" ry="42" fill="none" stroke="#388e3c" stroke-width="1.5" opacity="0.4"/>
        <!-- Rotor (inner) -->
        <ellipse cx="830" cy="380" rx="40" ry="25" fill="none" stroke="#66bb6a" stroke-width="2"/>
        <!-- Coil windings hint -->
        <path d="M 790 365 Q 810 355, 830 365 Q 850 375, 870 365" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.5"/>
        <path d="M 790 380 Q 810 370, 830 380 Q 850 390, 870 380" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.5"/>
        <path d="M 790 395 Q 810 385, 830 395 Q 850 405, 870 395" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.5"/>
        <!-- Shaft stub (left side) -->
        <rect x="722" y="374" width="20" height="12" fill="#37474f" rx="2" stroke="#66bb6a" stroke-width="1"/>
        <!-- Lightning bolt -->
        <g transform="translate(890, 345)">
          <polygon points="8,0 0,16 9,16 3,30 20,12 11,12 17,0" fill="#ffeb3b" filter="url(#glow-sm)" opacity="0.8"/>
        </g>
        <!-- Label -->
        <text id="gen-label" x="830" y="308" text-anchor="middle" font-size="15" fill="#66bb6a" font-weight="700" opacity="0">
          GENERATOR
        </text>
        <text id="gen-sublabel" x="830" y="458" text-anchor="middle" font-size="11" fill="#a5d6a7" opacity="0">
          Converts rotation to electricity
        </text>
      </g>

      <!-- ============ CONDENSER ============ -->
      <g id="condenser">
        <!-- Housing -->
        <rect x="1000" y="310" width="200" height="140" fill="#0a1520" rx="12"
              stroke="#26a69a" stroke-width="1.5"/>
        <!-- Cooling fins -->
        <line x1="1025" y1="325" x2="1025" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1050" y1="325" x2="1050" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1075" y1="325" x2="1075" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1100" y1="325" x2="1100" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1125" y1="325" x2="1125" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1150" y1="325" x2="1150" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <line x1="1175" y1="325" x2="1175" y2="435" stroke="#1a3a3a" stroke-width="8" opacity="0.5"/>
        <!-- Serpentine pipe inside -->
        <path d="M 1020 345 L 1180 345 L 1180 370 L 1020 370 L 1020 395 L 1180 395 L 1180 420 L 1020 420"
              fill="none" stroke="#4db6ac" stroke-width="3" stroke-linecap="round"/>
        <!-- Fan icon -->
        <g transform="translate(1100, 380)">
          <circle cx="0" cy="0" r="18" fill="none" stroke="#26a69a" stroke-width="1" opacity="0.4"/>
          <path d="M 0 -12 Q 8 -4, 0 0 Q -8 4, 0 12 Q 8 4, 0 0 Q -8 -4, 0 -12" fill="#26a69a" opacity="0.3"/>
        </g>
        <!-- Label -->
        <text id="cond-label" x="1100" y="298" text-anchor="middle" font-size="15" fill="#26a69a" font-weight="700" opacity="0">
          CONDENSER
        </text>
        <text id="cond-sublabel" x="1100" y="468" text-anchor="middle" font-size="11" fill="#80cbc4" opacity="0">
          Cools vapor back to liquid
        </text>
      </g>

      <!-- ============ ASSEMBLED HOUSING (fades out as exploded) ============ -->
      <g id="assembled-housing">
        <rect x="145" y="265" width="1070" height="230" fill="none" rx="16"
              stroke="#37474f" stroke-width="2" stroke-dasharray="0"/>
        <text x="680" y="255" text-anchor="middle" font-size="14" fill="#546e7a" font-weight="600">ORC Unit</text>
      </g>

    </svg>
  </div>

  <!-- Slider -->
  <div id="slider-bar">
    <label>Assembled</label>
    <input type="range" id="explode-slider" min="0" max="1000" value="0" step="1"/>
    <label class="label-right">Exploded</label>
    <div id="progress-label">0%</div>
  </div>

  <script>
    // ======================== TIMELINE SETUP ========================
    // We build a GSAP timeline and scrub it with the slider.
    // progress 0 = fully assembled, 1 = fully exploded with evaporator open and pipes separated.

    const tl = gsap.timeline({ paused: true });

    // Phase 1 (0 → 0.4): Components spread apart horizontally
    // Evaporator stays put (anchor left), others move right
    tl.to('#turbine', {
      x: 60, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#generator', {
      x: 120, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#condenser', {
      x: 180, duration: 0.4, ease: 'none'
    }, 0);

    // Fade out assembled housing
    tl.to('#assembled-housing', {
      opacity: 0, duration: 0.15, ease: 'none'
    }, 0);

    // Fade in component labels
    tl.to('#evap-label', { opacity: 1, duration: 0.15, ease: 'none' }, 0.1);
    tl.to('#turbine-label', { opacity: 1, duration: 0.15, ease: 'none' }, 0.12);
    tl.to('#gen-label', { opacity: 1, duration: 0.15, ease: 'none' }, 0.14);
    tl.to('#cond-label', { opacity: 1, duration: 0.15, ease: 'none' }, 0.16);

    // Fade in sublabels
    tl.to('#evap-sublabel', { opacity: 1, duration: 0.15, ease: 'none' }, 0.2);
    tl.to('#turbine-sublabel', { opacity: 1, duration: 0.15, ease: 'none' }, 0.22);
    tl.to('#gen-sublabel', { opacity: 1, duration: 0.15, ease: 'none' }, 0.24);
    tl.to('#cond-sublabel', { opacity: 1, duration: 0.15, ease: 'none' }, 0.26);

    // Fade in connecting lines
    tl.to('#connect-lines', { opacity: 1, duration: 0.1, ease: 'none' }, 0.15);

    // Move connecting lines to track components
    tl.to('#conn-evap-turb', {
      attr: { x2: 560 }, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#conn-label-1', {
      x: 30, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#conn-turb-gen', {
      attr: { x1: 720, x2: 860 }, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#conn-label-2', {
      x: 60, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#conn-gen-cond', {
      attr: { x1: 1040, x2: 1180 }, duration: 0.4, ease: 'none'
    }, 0);
    tl.to('#conn-label-3', {
      x: 90, duration: 0.4, ease: 'none'
    }, 0);

    // Slowly spin turbine rotor as we explode
    tl.to('#turbine-rotor', {
      rotation: 90, duration: 0.4, ease: 'none', transformOrigin: 'center center'
    }, 0);

    // Phase 2 (0.4 → 0.65): Evaporator shell opens (top goes up, bottom goes down)
    tl.to('#evap-shell-top', {
      y: -50, duration: 0.25, ease: 'none'
    }, 0.4);
    tl.to('#evap-shell-bottom', {
      y: 50, duration: 0.25, ease: 'none'
    }, 0.4);

    // Fade out side walls as shell opens
    tl.to('#evap-body', {
      opacity: 0, duration: 0.15, ease: 'none'
    }, 0.4);

    // Expand clip rect to show interior
    tl.to('#evap-clip-rect', {
      attr: { y: 250, height: 260 }, duration: 0.25, ease: 'none'
    }, 0.4);

    // Show port labels
    tl.to('#evap-ports', {
      opacity: 1, duration: 0.15, ease: 'none'
    }, 0.5);

    // Phase 3 (0.65 → 1.0): Interior pipes separate
    // Hot water pipes move up, working fluid shell moves down
    tl.to('#hot-water-pipes', {
      y: -40, duration: 0.35, ease: 'none'
    }, 0.65);
    tl.to('#fluid-pipes', {
      y: 40, duration: 0.35, ease: 'none'
    }, 0.65);

    // Show pipe labels
    tl.to('#label-hot-pipes', {
      opacity: 1, duration: 0.15, ease: 'none'
    }, 0.75);
    tl.to('#label-fluid-pipes', {
      opacity: 1, duration: 0.15, ease: 'none'
    }, 0.75);

    // Continue turbine spin in phase 3
    tl.to('#turbine-rotor', {
      rotation: 180, duration: 0.35, ease: 'none', transformOrigin: 'center center'
    }, 0.65);

    // ======================== SLIDER CONTROL ========================
    const slider = document.getElementById('explode-slider');
    const progressLabel = document.getElementById('progress-label');

    slider.addEventListener('input', () => {
      const progress = slider.value / 1000;
      tl.progress(progress);
      progressLabel.textContent = Math.round(progress * 100) + '%';
    });

    // Also support mouse wheel on the SVG
    document.getElementById('scene-container').addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 15 : -15;
      let newVal = Math.min(1000, Math.max(0, parseInt(slider.value) + delta));
      slider.value = newVal;
      slider.dispatchEvent(new Event('input'));
    }, { passive: false });

    // ======================== HOVER TOOLTIPS ========================
    const tipName = document.getElementById('tip-name');
    const tipDesc = document.getElementById('tip-desc');

    const tooltips = {
      'evaporator': { name: 'Evaporator', desc: 'A shell-and-tube heat exchanger where hot water from the plant heats the organic working fluid until it boils into vapor.' },
      'turbine': { name: 'Turbine', desc: 'High-pressure vapor pushes against the turbine blades, spinning the rotor and converting thermal energy into mechanical rotation.' },
      'generator': { name: 'Generator', desc: 'Connected to the turbine by a shaft. The spinning rotor moves magnets past copper coils to produce electricity.' },
      'condenser': { name: 'Condenser', desc: 'Cooling fins and a fan remove heat from the spent vapor, condensing it back into a liquid to restart the cycle.' },
    };

    ['evaporator', 'turbine', 'generator', 'condenser'].forEach(id => {
      const el = document.getElementById(id);
      el.style.cursor = 'pointer';
      el.addEventListener('mouseenter', () => {
        const t = tooltips[id];
        tipName.textContent = t.name;
        tipDesc.textContent = t.desc;
      });
      el.addEventListener('mouseleave', () => {
        tipName.textContent = '';
        tipDesc.textContent = '';
      });
    });
  </script>
</body>
</html>
